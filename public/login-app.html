<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATTENDIFY — Secure Mobile Login</title>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preload" as="image" href="logo.webp" type="image/webp">
    <link rel="icon" type="image/webp" href="logo.webp">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background:
                radial-gradient(circle at 20% 15%, rgba(99, 102, 241, 0.14), transparent 42%),
                radial-gradient(circle at 85% 85%, rgba(129, 140, 248, 0.1), transparent 38%),
                var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 36px 28px 32px;
            box-shadow:
                0 10px 25px -5px rgba(0, 0, 0, 0.3),
                0 8px 10px -6px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(129, 140, 248, 0.06);
            text-align: center;
            animation: cardIn 0.4s ease-out;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-wrap {
            width: 88px;
            height: 88px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(129, 140, 248, 0.22);
            box-shadow: 0 0 28px rgba(99, 102, 241, 0.14);
        }

        .logo {
            display: block;
            width: 56px;
            height: 56px;
            margin: 0;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        .brand-text {
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
            margin: 0 0 24px 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            height: 48px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-google {
            background-color: #ffffff;
            color: #1e293b;
            border: 1px solid #e2e8f0;
        }

        .btn-google:hover {
            background-color: #f8fafc;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
        }

        .btn-google:active {
            transform: scale(0.98);
        }

        .trust-note {
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            line-height: 1.4;
        }

        .trust-note svg {
            flex-shrink: 0;
            color: #818cf8;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        .btn-primary:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .btn-success:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        .google-icon {
            width: 18px;
            height: 18px;
        }

        .token-container {
            display: none;
            margin-top: 24px;
            text-align: left;
        }

        .instruction-box {
            background: rgba(99, 102, 241, 0.08);
            border: 1.5px solid rgba(99, 102, 241, 0.15);
            padding: 14px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .token-area {
            width: 100%;
            height: 80px;
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            color: var(--text-color);
            font-family: monospace;
            font-size: 11px;
            resize: none;
            margin-bottom: 16px;
            box-sizing: border-box;
            word-break: break-all;
        }

        #message {
            margin-top: 16px;
            font-size: 13px;
            font-weight: 500;
        }

        .error {
            color: #ef4444;
        }

        .info {
            color: #6366f1;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .spinner {
            margin: 20px auto;
            width: 44px;
            height: 44px;
            border: 4px solid rgba(99, 102, 241, 0.1);
            border-top-color: #818cf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
    </style>
    <!-- Firebase CDN SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="assets/js/firebase-config.js?v=5"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo-wrap">
                <img src="logo.webp" alt="ATTENDIFY Logo" class="logo" width="56" height="56" fetchpriority="high" decoding="async" onerror="this.src='logo-opt.png'">
            </div>
            <h1><span class="brand-text">ATTENDIFY</span></h1>
            <p id="page-subtitle">Secure Browser Sign-In for Mobile App</p>

            <!-- Default connecting state -->
            <div id="connecting-state" style="text-align: center;">
                <div class="spinner"></div>
                <div id="connecting-message" style="font-size: 14px; color: var(--text-color); font-weight: 500; margin-bottom: 20px;">
                    Connecting to Google...
                </div>
            </div>

            <!-- Manual Sign-in Trigger (Hidden by default, shown if redirect fails) -->
            <div id="login-section" style="display: none; margin-top: 20px;">
                <button class="btn btn-google" onclick="signInWithGoogle()">
                    <svg class="google-icon" width="18" height="18" viewBox="0 0 18 18" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
                        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A9 9 0 009 18z" fill="#34A853"/>
                        <path d="M3.964 10.706A5.41 5.41 0 013.682 9c0-.594.102-1.17.282-1.706V4.962H.957A8.993 8.993 0 000 9c0 1.488.365 2.9 1.008 4.148l2.956-2.442z" fill="#FBBC05"/>
                        <path d="M9 3.58c1.32 0 2.505.454 3.436 1.346l2.582-2.58C13.463.896 11.426 0 9 0A9 9 0 00.957 4.962l2.956 2.442c.708-2.127 2.692-3.711 5.036-3.711z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>
                <p class="trust-note">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                    Secured by Google · No password stored
                </p>
            </div>

            <!-- Successful login redirect screen -->
            <div id="token-section" class="token-container" style="text-align: center; padding: 20px 0;">
                <div class="spinner" style="margin-bottom: 20px;"></div>
                <h3 style="margin-bottom: 8px; font-weight: 700; color: var(--text-color);">🎉 Sign-in Successful!</h3>
                <p id="token-display" style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px; line-height: 1.5;">
                    Redirecting you back to the <strong>ATTENDIFY</strong> app...
                </p>
                <div style="border-top: 1px solid var(--border-color); padding-top: 16px; margin-top: 16px;">
                    <p style="color: var(--text-muted); font-size: 12px; font-weight: 500;">
                        If the app did not open, please close this page and reopen from ATTENDIFY.
                    </p>
                </div>
            </div>

            <div id="message"></div>
        </div>
    </div>

    <script>
        let signingIn = false;
        const urlParams = new URLSearchParams(window.location.search);
        const isStudentFlow = urlParams.get('flow') === 'student';

        // Clean up URL query parameters from the address bar to prevent exposure of session keys
        if (window.history && window.history.replaceState) {
            window.history.replaceState({}, document.title, window.location.pathname);
        }


        function signInWithGoogle() {
            if (signingIn) return;
            signingIn = true;

            const msgDiv = document.getElementById('message');
            document.getElementById('connecting-state').style.display = 'block';
            document.getElementById('login-section').style.display = 'none';
            msgDiv.textContent = '';
            msgDiv.className = '';

            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });

            // signInWithPopup works reliably in system browser (Chrome) — no redirect loop
            auth.signInWithPopup(provider).then((result) => {
                if (isStudentFlow) {
                    // ✅ Student flow: send uid-based deep link — no token copy-paste needed
                    handleStudentFlow(result.user);
                } else {
                    // CR/Teacher flow: send idToken for auth
                    const idToken = result.credential ? result.credential.idToken : null;
                    if (idToken) {
                        handleSuccessfulLogin(idToken);
                    } else {
                        return result.user.getIdToken().then((token) => {
                            handleSuccessfulLogin(token);
                        });
                    }
                }
            }).catch((error) => {
                console.error('Sign-in error:', error);
                signingIn = false;
                document.getElementById('connecting-state').style.display = 'none';
                document.getElementById('login-section').style.display = 'block';
                msgDiv.textContent = '❌ Sign-in failed: ' + error.message;
                msgDiv.className = 'error';
            });
        }

        // ✅ Student flow: write uid and idToken to Firebase session — app listener picks it up automatically
        function handleStudentFlow(user) {
            console.log('[Login-App] handleStudentFlow called');
            const msgDiv = document.getElementById('message');
            const sk = urlParams.get('sk');
            console.log('[Login-App] Session key from URL:', sk);

            document.getElementById('connecting-state').style.display = 'none';
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('token-section').style.display = 'block';
            document.getElementById('token-display').textContent = '✅ Signed in as: ' + user.displayName + ' (Sending you back to the app...)';
            msgDiv.textContent = '';
            msgDiv.className = '';

            if (sk) {
                console.log('[Login-App] Session key present, calling getIdToken');
                // Get idToken and write to Firebase — app listener will auto-login
                user.getIdToken().then((idToken) => {
                    console.log('[Login-App] getIdToken succeeded, idToken length:', idToken.length);
                    const db = firebase.database();
                    const sessionData = {
                        uid: user.uid,
                        idToken: idToken,
                        ts: Date.now()
                    };
                    console.log('[Login-App] Writing to Firebase: student_auth_sessions/' + sk, { uid: user.uid, hasIdToken: !!idToken, ts: sessionData.ts });
                    db.ref('student_auth_sessions/' + sk).set(sessionData).then(() => {
                        console.log('[Login-App] Firebase write succeeded');
                        // Session written — app listener will pick it up automatically
                        document.getElementById('token-display').textContent = '✅ Signed in as: ' + user.displayName + ' (Please return to the ATTENDIFY app.)';
                        // Deep link redirect to bring the app back to foreground
                        console.log('[Login-App] Triggering deep link: attendify://login?flow=student');
                        setTimeout(() => {
                            window.location.href = "attendify://login?flow=student";
                        }, 500);
                    }).catch((err) => {
                        console.error('[Login-App] Session write error:', err);
                        console.error('[Login-App] Error code:', err.code);
                        console.error('[Login-App] Error message:', err.message);
                        document.getElementById('token-section').style.display = 'none';
                        const messageEl = document.getElementById('message');
                        messageEl.textContent = '❌ Session error: ' + err.message;
                        messageEl.className = 'error';
                    });
                }).catch((err) => {
                    console.error('[Login-App] Failed to get idToken:', err);
                    document.getElementById('token-section').style.display = 'none';
                    const messageEl = document.getElementById('message');
                    messageEl.textContent = '❌ Token error: ' + err.message;
                    messageEl.className = 'error';
                });
            } else {
                console.error('[Login-App] No session key found in URL');
                // No session key — show error, cannot proceed without sk
                document.getElementById('token-section').style.display = 'none';
                const messageEl = document.getElementById('message');
                messageEl.textContent = '❌ Invalid session link. Please reopen from the ATTENDIFY app.';
                messageEl.className = 'error';
            }
        }

        // Show the sign-in button immediately on load — no auto-redirect
        window.addEventListener('DOMContentLoaded', () => {
            if (isStudentFlow) {
                document.getElementById('page-subtitle').textContent = 'Sign in to return to your attendance portal';
            }
            document.getElementById('connecting-state').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        });

        function handleSuccessfulLogin(idToken) {
            const msgDiv = document.getElementById('message');
            const sk = urlParams.get('sk');

            document.getElementById('connecting-state').style.display = 'none';
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('token-section').style.display = 'block';
            document.getElementById('token-display').textContent = '✅ Signed in successfully! (Please return to the ATTENDIFY app.)';
            msgDiv.textContent = '';
            msgDiv.className = '';

            if (sk) {
                // Secure Session Relay: Write idToken to Firebase for CR/Teacher login
                const db = firebase.database();
                db.ref('student_auth_sessions/' + sk).set({
                    uid: firebase.auth().currentUser.uid,
                    idToken: idToken,
                    ts: Date.now()
                }).then(() => {
                    document.getElementById('token-display').textContent = '✅ Signed in successfully! (Please return to the ATTENDIFY app.)';
                    // Attempt to deep link redirect back to app
                    setTimeout(() => {
                        window.location.href = "attendify://login";
                    }, 500);
                }).catch((err) => {
                    console.error('Session write error:', err);
                    document.getElementById('token-section').style.display = 'none';
                    const messageEl = document.getElementById('message');
                    messageEl.textContent = '❌ Session error. Please close this page and try again.';
                    messageEl.className = 'error';
                });
            } else {
                // No session key - cannot proceed securely
                document.getElementById('token-section').style.display = 'none';
                const messageEl = document.getElementById('message');
                messageEl.textContent = '❌ Invalid session link. Please reopen from the ATTENDIFY app.';
                messageEl.className = 'error';
            }
        }


    </script>
</body>
</html>
