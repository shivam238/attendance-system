<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Share your feedback about ATTENDIFY — help us improve the QR attendance system with your suggestions and ratings.">
    <title>Feedback Form | ATTENDIFY</title>
    <link rel="icon" type="image/webp" href="logo.webp">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        body.dark-mode {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { 
            max-width: 900px; 
            width: 100%;
            background: var(--card-bg);
            border-radius: 30px;
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        .back-home {
            align-self: flex-start;
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        h1 {
            background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 36px;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 16px;
        }

        .logo-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }

        .feedback-logo {
            width: 60px;
            height: 60px;
            filter: drop-shadow(0 4px 12px rgba(99, 102, 241, 0.2));
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .feedback-logo:hover {
            transform: scale(1.1) rotate(5deg);
            filter: drop-shadow(0 6px 20px rgba(168, 85, 247, 0.4));
        }

        /* Iframe Container */
        .iframe-container {
            position: relative;
            width: 100%;
            height: 700px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--bg);
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .container { padding: 20px; }
            h1 { font-size: 28px; }
            .iframe-container { height: 600px; }
        }
    </style>
    <script>
        if(localStorage.getItem("darkMode") === "true") {
            document.documentElement.classList.add("dark-mode");
            document.addEventListener("DOMContentLoaded", () => {
                document.body.classList.add("dark-mode");
            });
        }
    </script>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-home">← Back to Dashboard</a>
        
        <div class="logo-wrapper">
            <svg class="feedback-logo" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <defs>
                    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="var(--primary)" />
                        <stop offset="100%" stop-color="#a855f7" />
                    </linearGradient>
                </defs>
                <!-- Speech bubble shape -->
                <path fill="none" d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke="url(#logo-grad)" />
                <!-- Star inside -->
                <polygon points="12 9 13.5 12 16.5 12.5 14.25 14.5 15 17.5 12 16 9 17.5 9.75 14.5 7.5 12.5 10.5 12" fill="url(#logo-grad)" stroke="none" />
            </svg>
        </div>
        <h1>Feedback & Analytics</h1>
        <p class="subtitle">Please take a moment to help us improve ATTENDIFY by sharing your experience.</p>

        <div class="iframe-container">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScr0zNjwIz2bqR-2Sxm1V5YPIaEUtL-iE8bOCYQjp-EqE5Wqw/viewform?embedded=true" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
        </div>
    </div>
</body>
</html>
