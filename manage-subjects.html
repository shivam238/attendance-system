<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manage Subjects | ATTENDIFY</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="shortcut icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/subjects.css">
    <script>
        // Apply dark mode from main app preference
        if (localStorage.getItem('darkMode') === 'true') {
            document.documentElement.style.display = 'none';
            document.addEventListener('DOMContentLoaded', () => {
                document.body.classList.add('dark-mode');
                document.documentElement.style.display = '';
            });
        }
    </script>
</head>

<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back to Dashboard</a>

        <div class="card">
            <div class="header">
                <h1>📚 Manage Subjects V2</h1>
                <p>Add, edit or delete your teaching subjects</p>
            </div>

            <div id="add-message"></div>

            <div class="form-group">
                <label>New Subject Name</label>
                <input type="text" id="subject-input" placeholder="e.g. Computer Networks">
            </div>
            <button class="btn btn-primary" id="add-btn" onclick="addSubject()">➕ ADD SUBJECT</button>

            <div class="subject-list" id="subject-list">
                <div class="empty-state">
                    <p>Checking login status...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Inline Config for stability
        const firebaseConfig = {
            apiKey: "AIzaSyDN6iWRpxLZuwzQYVX580eTQbZuz2VY-HU",
            authDomain: "firstfile-c763521e.firebaseapp.com",
            databaseURL: "https://firstfile-c763521e-default-rtdb.firebaseio.com",
            projectId: "firstfile-c763521e",
            storageBucket: "firstfile-c763521e.appspot.com",
            messagingSenderId: "338947118228",
            appId: "1:338947118228:web:7573617be2d12e616259c7"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.database();
        const auth = firebase.auth();
        let currentUserData = null;

        function showMessage(msg, type = 'success') {
            const msgDiv = document.getElementById('add-message');
            if (msgDiv) {
                msgDiv.innerHTML = `<div class="message ${type}">${msg}</div>`;
                setTimeout(() => { if (msgDiv) msgDiv.innerHTML = ''; }, 3000);
            }
        }

        // Auth Listener
        auth.onAuthStateChanged((user) => {
            if (user) {
                console.log("Logged in:", user.uid);
                loadUserSubjects(user.uid);
            } else {
                console.log("Not logged in, redirecting...");
                window.location.href = 'index.html';
            }
        });

        function loadUserSubjects(uid) {
            db.ref('users/' + uid).on('value', (snapshot) => {
                const data = snapshot.val();
                currentUserData = data || { subjects: [] };
                if (!currentUserData.subjects) currentUserData.subjects = [];
                renderSubjects(currentUserData.subjects);
            });
        }

        // --- Smart Drag-and-Drop Engine ---
        let draggedItem = null;

        function setupDraggableItem(item) {
            item.draggable = true;
            item.addEventListener('dragstart', (e) => {
                draggedItem = item;
                item.classList.add('dragging-item');
                e.dataTransfer.effectAllowed = 'move';
            });

            item.addEventListener('dragover', (e) => {
                e.preventDefault();
                const draggingEl = document.querySelector('.dragging-item');
                if (!draggingEl || draggingEl.parentNode !== item.parentNode || draggingEl === item) return;
                
                const bounding = item.getBoundingClientRect();
                const offset = bounding.y + bounding.height / 2;
                
                if (e.clientY < offset) {
                    item.parentNode.insertBefore(draggingEl, item);
                } else {
                    item.parentNode.insertBefore(draggingEl, item.nextSibling);
                }
            });

            item.addEventListener('dragleave', () => {
                // Style handled via CSS class
            });

            item.addEventListener('drop', (e) => {
                e.preventDefault();
                saveNewOrder(item.parentNode);
            });

            item.addEventListener('dragend', () => {
                item.classList.remove('dragging-item');
                draggedItem = null;
                document.querySelectorAll('.subject-item').forEach(el => {
                    el.style.borderTop = 'none';
                    el.style.borderBottom = 'none';
                });
            });
        }

        async function saveNewOrder(parent) {
            const newOrder = Array.from(parent.querySelectorAll('.subject-name')).map(el => el.textContent);
            const user = auth.currentUser;
            if (!user) return;

            try {
                await db.ref('users/' + user.uid).update({ subjects: newOrder });
                showMessage("✅ Order saved!");
            } catch (e) {
                showMessage("Error saving order: " + e.message, "error");
            }
        }

        function renderSubjects(subjects) {
            const list = document.getElementById('subject-list');
            if (!list) return;

            if (!subjects || subjects.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📂</div>
                        <p>No subjects added yet. Add your first subject above!</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = '';
            subjects.forEach((sub, index) => {
                const item = document.createElement('div');
                item.className = 'subject-item';
                item.innerHTML = `
                    <div style="display:flex; align-items:center; gap:12px; flex:1;">
                        <div class="drag-handle" style="cursor:grab; opacity:0.6;">⠿</div>
                        <div class="subject-name">${sub}</div>
                    </div>
                    <div class="subject-actions">
                        <button class="btn btn-small btn-primary" onclick="renameSubject(${index})" style="width:40px;height:40px;padding:0;display:flex;align-items:center;justify-content:center;">✏️</button>
                        <button class="btn btn-small btn-danger" onclick="deleteSubject(${index})" style="width:40px;height:40px;padding:0;display:flex;align-items:center;justify-content:center;">🗑️</button>
                    </div>
                `;
                setupDraggableItem(item);
                list.appendChild(item);
            });
        }

        async function addSubject() {
            const input = document.getElementById('subject-input');
            const btn = document.getElementById('add-btn');
            const name = input.value.trim();
            const user = auth.currentUser;

            if (!name) return showMessage("Please enter a subject name", "error");
            if (!user) return showMessage("Authentication error. Please login.", "error");

            btn.disabled = true;
            btn.innerHTML = "Adding...";

            try {
                const snapshot = await db.ref('users/' + user.uid + '/subjects').once('value');
                let currentSubjects = snapshot.val() || [];

                if (currentSubjects.includes(name)) {
                    showMessage("Subject already exists", "error");
                    btn.disabled = false;
                    btn.innerHTML = "➕ ADD SUBJECT";
                    return;
                }

                currentSubjects.push(name);
                await db.ref('users/' + user.uid).update({ subjects: currentSubjects });

                input.value = '';
                showMessage("✅ Added Successfully!");
            } catch (e) {
                console.error(e);
                showMessage("Error: " + e.message, "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = "➕ ADD SUBJECT";
            }
        }

        async function renameSubject(index) {
            const user = auth.currentUser;
            if (!user || !currentUserData) return;

            const oldName = currentUserData.subjects[index];
            const newName = prompt("Rename Subject:", oldName);

            if (!newName || newName.trim() === "" || newName === oldName) return;

            try {
                let subjects = [...currentUserData.subjects];
                subjects[index] = newName.trim();

                await db.ref('users/' + user.uid).update({ subjects: subjects });
                showMessage("✏️ Renamed successfully!");
            } catch (e) {
                showMessage("Error: " + e.message, "error");
            }
        }

        async function deleteSubject(index) {
            if (!confirm("Are you sure you want to delete this subject?")) return;
            const user = auth.currentUser;
            if (!user) return;

            try {
                const snapshot = await db.ref('users/' + user.uid + '/subjects').once('value');
                let subjects = snapshot.val() || [];
                subjects.splice(index, 1);
                await db.ref('users/' + user.uid).update({ subjects: subjects });
                showMessage("🗑️ Deleted successfully!");
            } catch (e) {
                showMessage("Error: " + e.message, "error");
            }
        }

        // Enter key support
        document.getElementById('subject-input').onkeypress = (e) => {
            if (e.key === 'Enter') addSubject();
        };
    </script>
</body>

</html>
